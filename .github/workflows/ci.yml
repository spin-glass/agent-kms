name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check agent_kms
      - name: Import smoke test
        run: |
          python -c "import agent_kms; print(agent_kms.__version__)"
          python -c "from agent_kms import cli, config, chunker, store, retrieve, ingest"
          python -c "from agent_kms.cli import build_parser; build_parser().parse_args(['--help']) if False else None"
      - name: CLI help
        run: |
          agent-kms --help
          agent-kms doctor || true  # doctor exits non-zero without Qdrant; that's expected on CI
